name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # Pré-génère l'affiche en PDF (dist/affiche.pdf) — échoue le build si KO,
      # pour ne jamais déployer un site sans son affiche imprimable.
      - run: npm run render:affiche
      # /affiche (HTML) et /affiche/pdf (générateur client) n'ont servi qu'à produire le
      # PDF ci-dessus : on ne les publie pas, seul dist/affiche.pdf est déployé.
      - run: rm -rf dist/affiche
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # Notifie les moteurs de recherche une fois le site en ligne.
  notify-search-engines:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # IndexNow — Bing, DuckDuckGo, Qwant, Ecosia, Yandex… Aucun compte requis.
      - run: node scripts/indexnow.mjs
      # Google Indexing API — best-effort, no-op tant que le secret n'est pas défini.
      # ⚠️ Officiellement limité à JobPosting/BroadcastEvent ; canal fiable = sitemap + GSC.
      - run: node scripts/google-index.mjs
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
