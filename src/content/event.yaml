# ══════════════════════════════════════════════════════════════════════
# CONFIGURATION DU SITE — Trail des Tectosages
#
# Modifiez ce fichier puis rechargez la page : tout le site se met à jour.
#
# Astuce : dans n'importe quel texte ci-dessous, vous pouvez écrire un
# de ces « jetons », il sera remplacé automatiquement :
#   {dateFull}        → Samedi 17 octobre 2026
#   {dateShort}       → SAM. 17 OCTOBRE
#   {dateShortMobile} → 17 OCT
#   {dateBadge}       → SAM. 17 OCT. 2026
#   {dateWeekday}     → SAMEDI
#   {year}            → 2026
#   {edition}         → I (chiffre romain)
#   {name}            → Trail des Tectosages
#   {location}        → Vieille-Toulouse (31)
#   {locationCity}    → VIEILLE-TOULOUSE
#   {raceCount}       → II (nombre de courses, en chiffre romain)
#   {maxDistance}     → 33 (distance de la plus longue course)
#   {course1Distance}/{course1Ascent} → 33 / 1000 (km tronqués et D+ de la 1re course)
#   {course2Distance}/{course2Ascent} → 11 / 400  (km tronqués et D+ de la 2e course)
#   {affichePdf}      → lien vers le PDF de l'affiche (/affiche.pdf en prod)
#   {email}           → adresse de contact (définie dans urls.contactEmail)
# ══════════════════════════════════════════════════════════════════════
main:
  # ── Paramètres généraux ─────────────────────────────────────────────
  date: 2026-10-17          # Date de l'évènement (AAAA-MM-JJ)
  edition: 1                # Numéro de l'édition (1 → « ÉDITION I »)
  name: Trail des Tectosages
  nameShort: Trail des      # Première ligne du logo…
  nameEmphasis: Tectosages  # …et seconde ligne (en italique doré)
  location: Vieille-Toulouse (31)
  locationShort: VIEILLE-TOULOUSE (31)
  locationCity: VIEILLE-TOULOUSE
  tagline: Sur la trace des Volques Tectosages
  description: >-
    Il y a 2300 ans, les Volques Tectosages, peuple celte en provenance de
    l'Est, s'installèrent sur le territoire de l'actuelle commune de
    Vieille-Toulouse, qui portait alors le nom de Tolosa Tectosagum.
    Ce territoire sera le théâtre de deux courses : le Défi de Copillos
    (33 km) et la Boucle de l'Oppidum (11 km).
  heroMedia: /video/hero.mp4   # Vidéo (ou image) plein écran de l'accueil

  # Fond de carte. Choix : dark-matter, positron, voyager,
  # openfreemap-liberty/positron/dark, ign-plan-v2, ign-scan-25, ign-photo.
  # Toute autre valeur est traitée comme une URL de style brute.
  mapStyle: ign-plan-v2

  urls:
    website: https://www.traildestectosages.fr  # site officiel (cible du QR de l'affiche)
    registration: https://chrono-start.fr/Inscription/Course/detail/c/5448  # page d'inscription Chrono-Start de l'événement
    contactEmail: traildestectosages@gmail.com

  # ── Menu de navigation ──────────────────────────────────────────────
  nav:
    - { label: HISTOIRE,        href: '#histoire'   }
    - { label: COURSES,         href: '#epreuves'   }
    - { label: BANQUET,         href: '#banquet'    }
    - { label: SOLIDARITÉ,      href: '#engagement' }
    - { label: INFOS PRATIQUES, href: '#pratique'   }
    - { label: SOUTIENS,        href: '#soutiens'   }

  ctaLabel: S'INSCRIRE
  heroCtaLabel: PRENDRE SON DOSSARD →

  # ── Bandeau de chiffres sous l'accueil ──────────────────────────────
  stats:
    - { big: '{course1Distance} KM', small: '{course1Ascent} M D+' }   # 1re course (auto depuis les fiches)
    - { big: '{course2Distance} KM', small: '{course2Ascent} M D+' }   # 2e course (auto depuis les fiches)
    - { big: '{dateShortMobile}.',   small: '{dateWeekday}'        }
    - { big: '{locationCity}',       small: 'HAUTE-GARONNE'        }

  # ── Section « Les courses » ─────────────────────────────────────────
  # Le contenu de chaque épreuve est dans src/content/races/*.md
  racesSection:
    label: — §01 / LES COURSES
    titleLine1: Deux épreuves
    titleLine2: Un seul territoire
    # Accroche facultative à droite du titre. Décommenter pour l'afficher :
    # tagline: >-
    #   De la Boucle de l'Oppidum au Défi de Copillos, deux courses chronométrées
    #   sur un même territoire.

  # ── Section « L'histoire » ──────────────────────────────────────────
  storytelling:
    label: — §00 / L'HISTOIRE
    title: 'Les traileurs sont-ils les'
    titleEmphasis: 'descendants des Tectosages ?'
    pillars:
      - n: 'I'
        title: L'ESPRIT DE CONQUÊTE
        body: >-
          Partir à la conquête du territoire de Tolosa, comme nos ancêtres
          gaulois il y a 2300 ans.
      - n: 'II'
        title: DES VALEURS ANCRÉES
        body: >-
          La bravoure, l'endurance, l'honneur, l'esprit de communauté
          caractérisaient le peuple Tectosage. Les mêmes valeurs devront être
          mobilisées par les coureurs du Trail des Tectosages.
      - n: 'III'
        title: LE DÉFI DE COPILLOS
        body: >-
          Copillos, chef des Tectosages, vous lance ce défi : finir 4 boucles
          dans un temps limité. Seuls les descendants des Tectosages
          franchiront la ligne d'arrivée — le statut d'héritier de Copillos
          reviendra au vainqueur.

  # ── Section « Le banquet » ──────────────────────────────────────────
  banquet:
    label: — §02 / LE SOIR
    titleLine1: 'Le '
    titleEmphasis: Banquet
    titleLine2: des Chefs
    body: >-
      La nuit tombée, le village se rassemble. Banquet organisé par le
      <em>Golf de Vieille-Toulouse</em>. Inscription séparée.
    places: 200                       # nombre de places au banquet
    registrationOpen: false           # inscriptions ouvertes ? false → affiche « à venir »
    soonLabel: Inscriptions à venir   # affiché tant que les inscriptions ne sont pas ouvertes
    cta: RÉSERVER SA PLACE →
    ctaUrl: https://chrono-start.com/
    # Lignes de soirée ajoutées au déroulé (autant que voulu, même horaire possible)
    schedule:
      - { time: 18h30, title: Animation enfants }
      - { time: 19h45, title: Remise des prix   }
      - { time: 20h00, title: Banquet des Chefs }

  # ── Section « Notre solidarité » ────────────────────────────────────
  engagement:
    label: — §03 / NOTRE SOLIDARITÉ
    titleLine1: Une part des inscriptions
    titleLine2: 'pour la '
    titleEmphasis: Fondation Marie-Louise
    body:
      - >-
        Portée par le <em>Lions Club Toulouse Arènes Romaines</em>,
        la Fondation Marie-Louise œuvre depuis plus de trente ans auprès
        des enfants et adolescents en situation de handicap ou de grande
        précarité en Haute-Garonne — séjours de répit, matériel adapté,
        soutien aux familles.
      - >-
        10 % du prix de chaque dossard sont reversés à la Fondation
        Marie-Louise. Courir, marcher, banqueter — c'est aussi donner.
    logo: /images/logo-marie-louise.png
    logoAlt: Fondation Marie-Louise
    url: https://www.fondation-marie-louise.org   # site officiel (lien « Site de la Fondation »)
    # Logo tel qu'il apparaît sur l'AFFICHE (bloc « au profit de ») — variante rectangulaire.
    posterLogo: /images/logo-marie-louise-rect.png
    posterWidth: 215
    posterPad: '16px 22px'
    stats:
      - { big: '+30', small: ANS D'ACTION       }
      - { big: '10%', small: DE CHAQUE DOSSARD   }

  # ── Section « Infos pratiques » ─────────────────────────────────────
  practicalInfo:
    label: — §04 / INFOS PRATIQUES
    titleLine1: Une journée,
    titleEmphasis: un village
    tagline: >-
      Rassemblement au cœur du village de Vieille-Toulouse. Les courses
      s'élancent à partir de 15h30, l'arrivée des derniers Héritiers est
      attendue vers 21h45.
    # ── Fiche du point de rencontre ──────────────────────────────────
    # Remplit la carte « Lieu de rencontre » ET ajoute l'ouverture du
    # village / retrait des dossards au déroulé de la journée (time).
    meetingPlace:
      time: 13h00                                   # retrait des dossards
      scheduleLabel: Retrait des dossards
      label: LIEU DE RENCONTRE
      title: Place du Village
      address: 31320 Vieille-Toulouse · Haute-Garonne
      accessNote: 15 min au sud de Toulouse centre
      infoTiles:
        - { key: PARKING, value: 'Ch. de Lespinas'  }
        - { key: NAVETTE, value: 'Dep. Ramonville'  }
        - { key: RETRAIT, value: 'Dès 13h00'        }
        - { key: GPS,     value: '43.526 · 1.445'   }
    # Déroulé de la journée — GÉNÉRÉ AUTOMATIQUEMENT à partir de l'heure
    # d'ouverture ci-dessus, de l'heure de départ de chaque épreuve
    # (src/content/races/*.md) et du banquet, triés par heure.
    schedule:
      label: DÉROULÉ DE LA JOURNÉE

  # ── Section « Avec le soutien de » ──────────────────────────────────
  supporters:
    label: — §05 / AVEC LE SOUTIEN DE
    titleLine1: Un trail rendu possible par
    titleEmphasis: deux villages et de nombreux soutiens
    body: >-
      Les communes de Vieille-Toulouse et de Pechbusque, le Golf de
      Vieille-Toulouse et de nombreux propriétaires privés ont ouvert leurs
      sentiers, leurs terrains et leurs portes — sans leur accord pour traverser
      ces terres, le tracé n'existerait pas. Le Lions Club Toulouse Arènes
      Romaines, lui, accompagne l'organisation. Un grand merci à
      toutes et à tous.
    # posterWidth / posterPad : taille du logo sur l'AFFICHE (le site se débrouille seul).
    partners:
      - { name: Mairie,     sub: Vieille-Toulouse, logo: /images/logo-mairie-vieille-toulouse.png, posterWidth: 170, posterPad: '14px 20px' }
      - { name: Mairie,     sub: Pechbusque,       logo: /images/logo-mairie-pechbusque.jpeg,      posterWidth: 135, posterPad: '13px 16px' }
      - { name: Lions Club, sub: Toulouse Arènes,  logo: /images/logo-lionsclubstoulouse.jpg,      posterWidth: 105, posterPad: '14px'      }
      - { name: Golf de,    sub: Vieille-Toulouse, logo: /images/logo-golf.png,                    posterWidth: 105, posterPad: '14px'      }

  # ── Bandeau final d'inscription ─────────────────────────────────────
  cta:
    label: '— {dateBadge} &nbsp;/&nbsp; INSCRIPTIONS OUVERTES'
    titleLine1: Héritier de
    titleEmphasis: Copillos
    titleSuffix: '?'
    button: PRENDRE SON DOSSARD →

  # ── Pied de page ────────────────────────────────────────────────────
  footer:
    legal: '© {year} · ASSOCIATION TRAIL DES TECTOSAGES'
    # Colonne « Ressources » du footer.
    # Les sections du site (Courses, Histoire, Banquet, Infos pratiques, Solidarité) ne sont
    # PAS répétées ici : elles sont déjà dans le menu de navigation du haut.
    eventLinks:
      - { label: "Affiche de l'événement", href: '{affichePdf}' }   # PDF statique en prod, générateur en dev
      - { label: Règlement,          href: '/reglement.pdf' }   # règlement intérieur (PDF dans public/)
    contactLinks:
      - { label: '{email}', href: 'mailto:{email}' }
      - { label: Instagram,             href: '#' }
    # Une seule page légale (les mentions légales couvrent aussi la confidentialité).
    legalLinks:
      - { label: MENTIONS LÉGALES, href: '/mentions-legales' }
    # (bloc « partenaire en vedette » retiré du footer)
